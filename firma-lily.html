<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Firma Lily One Travel</title>

<style>

body{
margin:0;
background:transparent;
}

.firma-container{
position:relative;
display:inline-block;
width:600px;
max-width:100%;
}

/* Imagen de firma */

.firma-img{
width:100%;
display:block;
position:relative;
z-index:2;
}

/* brillo que recorre el logo */

.shine{
position:absolute;
top:0;
left:-100%;
width:60%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.8),
transparent
);
animation:shine 6s infinite;
z-index:3;
mix-blend-mode:screen;
}

@keyframes shine{

0%{
left:-120%;
}

40%{
left:120%;
}

100%{
left:120%;
}

}

/* canvas partículas */

.magic{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:4;
}

</style>

</head>


<body>

<div class="firma-container">

<img src="firma.png" class="firma-img">

<div class="shine"></div>

<canvas class="magic" id="magicCanvas"></canvas>

</div>



<script>

const canvas=document.getElementById("magicCanvas")
const ctx=canvas.getContext("2d")

let W
let H

function resize(){

W=canvas.width=canvas.offsetWidth
H=canvas.height=canvas.offsetHeight

}

resize()

window.addEventListener("resize",resize)



const stars=[]



function createStar(){

stars.push({

x:Math.random()*W,
y:Math.random()*H,
size:Math.random()*2+1,
life:Math.random()*80+40,
vx:(Math.random()-0.5)*0.3,
vy:(Math.random()-0.5)*0.3

})

}



function drawStar(x,y,size){

ctx.beginPath()

ctx.fillStyle="rgba(255,255,200,0.9)"

ctx.arc(x,y,size,0,Math.PI*2)

ctx.fill()

}



function animate(){

ctx.clearRect(0,0,W,H)

if(stars.length<30){
createStar()
}

stars.forEach((s,i)=>{

s.x+=s.vx
s.y+=s.vy
s.life--

drawStar(s.x,s.y,s.size)

if(s.life<=0){

stars.splice(i,1)

}

})

requestAnimationFrame(animate)

}

animate()



/* polvo mágico del sombrero */

function createMagicTrail(){

stars.push({

x:120 + Math.random()*40,
y:40 + Math.random()*20,
size:Math.random()*3+1,
life:80,
vx:Math.random()*0.5,
vy:-Math.random()*0.2

})

}

setInterval(createMagicTrail,200)

</script>



</body>
</html>
