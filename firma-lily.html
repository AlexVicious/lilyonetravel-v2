<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Firma Lily One Travel</title>

<style>

body{
margin:0;
padding:0;
background:transparent;
display:flex;
justify-content:center;
align-items:center;
}

.firma-container{
position:relative;
width:650px;
max-width:100%;
}

.firma-img{
width:100%;
height:auto;
display:block;
z-index:2;
position:relative;
}

/* brillo que recorre el logo */

.glow-sweep{
position:absolute;
top:0;
left:-100%;
width:50%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.7),
transparent
);
filter:blur(8px);
animation:sweep 6s infinite;
z-index:3;
pointer-events:none;
}

@keyframes sweep{
0%{left:-100%;}
50%{left:120%;}
100%{left:120%;}
}

/* canvas partículas */

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:4;
}

</style>
</head>

<body>

<div class="firma-container">

<img src="firma.png" class="firma-img">

<div class="glow-sweep"></div>

<canvas id="magic"></canvas>

</div>

<script>

const canvas = document.getElementById("magic")
const ctx = canvas.getContext("2d")

let W
let H

function resize(){
W = canvas.width = canvas.offsetWidth
H = canvas.height = canvas.offsetHeight
}

resize()

window.addEventListener("resize",resize)

const particles=[]

function rand(a,b){
return Math.random()*(b-a)+a
}

/* estrellas tipo tinker bell */

function createStar(){
particles.push({
x:rand(W*0.05,W*0.35),
y:rand(H*0.15,H*0.45),
vx:rand(0.1,0.4),
vy:rand(-0.05,0.05),
life:rand(80,140),
size:rand(1,2.5)
})
}

/* polvo mágico sombrero */

function createMagicDust(){
particles.push({
x:rand(W*0.18,W*0.28),
y:rand(H*0.05,H*0.15),
vx:rand(0.1,0.3),
vy:rand(-0.2,-0.05),
life:rand(60,120),
size:rand(1,2)
})
}

function update(){

ctx.clearRect(0,0,W,H)

if(Math.random()<0.2)createStar()
if(Math.random()<0.12)createMagicDust()

particles.forEach((p,i)=>{

p.x+=p.vx
p.y+=p.vy
p.life--

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fillStyle="rgba(255,215,120,0.9)"
ctx.fill()

if(p.life<=0)particles.splice(i,1)

})

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
